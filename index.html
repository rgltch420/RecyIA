<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PROTOTYPE — Analizador de Rutinas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/src/css/style.css" />
</head>
<body>
  <div id="app">
    <header class="header">
      <div class="header-inner">
        <div class="logo">
          <span class="logo-icon">⬡</span>
          <span class="logo-text">PROTO<span class="logo-accent">TYPE</span></span>
        </div>
        <div class="model-status" id="modelStatus">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">Detectando modelo...</span>
        </div>
      </div>
    </header>

    <main class="main">

      <section class="panel panel-input">
        <div class="panel-label">01 / PARÁMETROS</div>

        <div class="form-group">
          <h3 class="section-title">Perfil del atleta</h3>
          <div class="grid-2">
            <div class="field">
              <label>Peso actual (kg)</label>
              <input type="number" id="weight" placeholder="75" min="40" max="200" />
            </div>
            <div class="field">
              <label>Edad</label>
              <input type="number" id="age" placeholder="28" min="14" max="80" />
            </div>
            <div class="field">
              <label>Altura (cm)</label>
              <input type="number" id="height" placeholder="175" min="140" max="220" />
            </div>
            <div class="field">
              <label>Experiencia</label>
              <select id="experience">
                <option value="principiante">Principiante (0-1 año)</option>
                <option value="intermedio" selected>Intermedio (1-3 años)</option>
                <option value="avanzado">Avanzado (3+ años)</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label>Objetivo principal</label>
            <div class="btn-group" id="goalGroup">
              <button class="btn-toggle active" data-value="fuerza">💪 Fuerza</button>
              <button class="btn-toggle" data-value="hipertrofia">🏋️ Hipertrofia</button>
              <button class="btn-toggle" data-value="resistencia">🫁 Resistencia</button>
              <button class="btn-toggle" data-value="perdida_grasa">🔥 Definición</button>
            </div>
          </div>
          <div class="field">
            <label>Lesiones o limitaciones <span class="optional">(opcional)</span></label>
            <input type="text" id="injuries" placeholder="Ej: dolor lumbar, rodilla derecha..." />
          </div>
        </div>

        <div class="form-group">
          <h3 class="section-title">Rutina actual</h3>
          <div class="field">
            <label>Días de entrenamiento por semana</label>
            <div class="btn-group" id="daysGroup">
              <button class="btn-toggle" data-value="2">2</button>
              <button class="btn-toggle" data-value="3">3</button>
              <button class="btn-toggle active" data-value="4">4</button>
              <button class="btn-toggle" data-value="5">5</button>
              <button class="btn-toggle" data-value="6">6</button>
            </div>
          </div>
          <div class="field">
            <label>Ejercicios con sus pesos actuales</label>
            <div id="exerciseList" class="exercise-list"></div>
            <button class="btn-add" id="addExercise">+ Agregar ejercicio</button>
          </div>
        </div>

        <button class="btn-analyze" id="analyzeBtn">
          <span class="btn-analyze-text">ANALIZAR RUTINA</span>
          <span class="btn-analyze-icon">→</span>
        </button>
      </section>

      <section class="panel panel-results">
        <div class="panel-label">02 / ANÁLISIS IA</div>

        <div id="emptyState" class="empty-state">
          <div class="empty-icon">◈</div>
          <p>Ingresa tu rutina y parámetros<br>para obtener el análisis.</p>
        </div>

        <div id="loadingState" class="loading-state hidden">
          <div class="loading-bars">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <p id="loadingText">Analizando tu rutina...</p>
        </div>

        <div id="results" class="results hidden">

          <div class="result-block score-block">
            <div class="score-circle" id="scoreCircle">
              <span id="scoreValue">--</span>
              <small>/ 10</small>
            </div>
            <div class="score-info">
              <div class="score-label" id="scoreLabel">Puntuación general</div>
              <div class="score-verdict" id="scoreVerdict">—</div>
            </div>
          </div>

          <div class="tabs">
            <button class="tab active" data-tab="mejoras">Mejoras</button>
            <button class="tab" data-tab="pesos">Progresión de pesos</button>
            <button class="tab" data-tab="rutina">Rutina optimizada</button>
            <button class="tab" data-tab="tips">Tips personalizados</button>
          </div>

          <div id="tabContent" class="tab-content">
            <!-- Dynamic content here -->
          </div>

          <div id="streamBox" class="stream-box hidden">
            <div class="stream-label">ANÁLISIS COMPLETO</div>
            <div id="streamText" class="stream-text"></div>
          </div>

        </div>
      </section>

    </main>

  </div>

  <script type="module" src="/src/js/main.js"></script>
</body>
</html>
